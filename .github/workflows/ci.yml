name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          cd example && flutter pub get

      - name: Format
        run: dart format --output=none --set-exit-if-changed lib example/lib

      - name: Analyze
        run: |
          flutter analyze
          cd example && flutter analyze

  kotlin:
    name: Kotlin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Lint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.8.0/ktlint
          chmod +x ktlint
          ./ktlint --relative "android/src/**/*.kt"

  swift:
    name: Swift
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install swift-format
        run: brew install swift-format

      - name: Lint
        run: swift-format lint --strict --recursive ios/Classes

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: cd example && flutter pub get

      - name: Build APK
        run: cd example && flutter build apk --release

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: cd example && flutter pub get

      - name: Build iOS
        run: cd example && flutter build ios --release --no-codesign
